<!doctype html>
<html lang="und" dir="auto" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">

<head>
  <title></title>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style type="text/css">
    #outlook a {
      padding: 0;
    }

    body {
      margin: 0;
      padding: 0;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    table,
    td {
      border-collapse: collapse;
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }

    img {
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
      -ms-interpolation-mode: bicubic;
    }

    p {
      display: block;
      margin: 13px 0;
    }

  </style>
  <!--[if mso]>
    <noscript>
    <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>

    </xml>

<body style="word-spacing:normal;">
  <div aria-roledescription="email" style="" role="article" lang="und" dir="auto">
    <!--[if mso | IE]><table align="center" border="0" cellpadding="0" cellspacing="0" class="" role="presentation" style="width:600px;" width="600" ><tr><td style="line-height:0px;font-size:0px;mso-line-height-rule:exactly;"><![endif]-->
    <div style="margin:0px auto;max-width:600px;">
      <table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="width:100%;">
        <tbody>
          <tr>
            <td style="direction:ltr;font-size:0px;padding:20px 0;text-align:center;">
              <!--[if mso | IE]><table role="presentation" border="0" cellpadding="0" cellspacing="0"><tr><td class="" style="vertical-align:top;width:600px;" ><![endif]-->
              <div class="mj-column-per-100 mj-outlook-group-fix" style="font-size:0px;text-align:left;direction:ltr;display:inline-block;vertical-align:top;width:100%;">
                <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="vertical-align:top;" width="100%">
                  <tbody>
                    <!-- Default table -->
                    <tr>
                      <td align="left" style="font-size:0px;padding:10px 25px;word-break:break-word;">
                        <table cellpadding="0" cellspacing="0" width="100%" border="0" style="color:#000000;font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:13px;line-height:22px;table-layout:auto;width:100%;border:none;">
                          <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>City</th>
                          </tr>
                          <tr>
                            <td>Alice</td>
                            <td>alice@example.com</td>
                            <td>New York</td>
                          </tr>
                          <tr>
                            <td>Bob</td>
                            <td>bob@example.com</td>
                            <td>London</td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                    <!-- Custom font / color / align -->
                    <tr>
                      <td align="center" style="font-size:0px;padding:20px 30px;word-break:break-word;">
                        <table cellpadding="0" cellspacing="0" width="100%" border="0" style="color:#444444;font-family:Arial, sans-serif;font-size:12px;line-height:18px;table-layout:auto;width:100%;border:none;">
                          <tr>
                            <td>Row 1</td>
                            <td>Data</td>
                          </tr>
                          <tr>
                            <td>Row 2</td>
                            <td>Data</td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                    <!-- Fixed table-layout, custom width -->
                    <tr>
                      <td align="left" style="font-size:0px;padding:10px;word-break:break-word;">
                        <table cellpadding="0" cellspacing="0" width="80%" border="0" style="color:#000000;font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:13px;line-height:22px;table-layout:fixed;width:80%;border:1px solid #cccccc;">
                          <tr>
                            <td style="width:50%">Left</td>
                            <td style="width:50%">Right</td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                    <!-- Table with cellspacing (triggers border-collapse:separate) -->
                    <tr>
                      <td align="left" style="background:#f5f5f5;font-size:0px;padding:15px;word-break:break-word;">
                        <table cellpadding="8" cellspacing="5" width="100%" border="0" style="color:#000000;font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:13px;line-height:22px;table-layout:auto;width:100%;border:none;border-collapse:separate;">
                          <tr>
                            <td>A</td>
                            <td>B</td>
                            <td>C</td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <!--[if mso | IE]></td></tr></table><![endif]-->
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <!--[if mso | IE]></td></tr></table><![endif]-->
  </div>
</body>

</html>
